name: Deploy to GCP Compute Engine VM

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  copy-repo-to-vm:
    runs-on: ubuntu-latest

    env:
      VM_HOST: ${{ secrets.GCP_VM_HOST }}
      VM_USER: ${{ secrets.GCP_VM_USER }}
      VM_PORT: ${{ secrets.GCP_VM_PORT }}
      VM_TARGET_DIR: ${{ secrets.GCP_VM_TARGET_DIR }}
      VM_SHARED_GROUP: ${{ secrets.GCP_VM_SHARED_GROUP }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$VM_HOST" || (echo "Missing secret: GCP_VM_HOST" && exit 1)
          test -n "$VM_USER" || (echo "Missing secret: GCP_VM_USER" && exit 1)
          test -n "${{ secrets.GCP_VM_SSH_KEY }}" || (echo "Missing secret: GCP_VM_SSH_KEY" && exit 1)

      - name: Set defaults for optional secrets
        run: |
          echo "VM_PORT=${VM_PORT:-22}" >> $GITHUB_ENV
          echo "VM_TARGET_DIR=${VM_TARGET_DIR:-/home/$VM_USER/fin_lit_chatbot}" >> $GITHUB_ENV
          echo "VM_SHARED_GROUP=${VM_SHARED_GROUP:-$VM_USER}" >> $GITHUB_ENV

      - name: Start SSH agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCP_VM_SSH_KEY }}

      - name: Add VM host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$VM_PORT" -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Ensure target directory exists on VM
        run: |
          ssh -p "$VM_PORT" "$VM_USER@$VM_HOST" "mkdir -p '$VM_TARGET_DIR'"

      - name: Ensure VM target directory is writable
        run: |
          ssh -p "$VM_PORT" "$VM_USER@$VM_HOST" "
            set -e
            mkdir -p '$VM_TARGET_DIR'
            if sudo -n true >/dev/null 2>&1; then
              if ! getent group '$VM_SHARED_GROUP' >/dev/null 2>&1; then
                sudo groupadd '$VM_SHARED_GROUP'
              fi
              sudo usermod -a -G '$VM_SHARED_GROUP' '$VM_USER'
              sudo chgrp -R '$VM_SHARED_GROUP' '$VM_TARGET_DIR'
              sudo chmod -R g+rwX '$VM_TARGET_DIR'
              sudo find '$VM_TARGET_DIR' -type d -exec chmod g+s {} +
            elif [ ! -w '$VM_TARGET_DIR' ]; then
              echo 'No write permission on target dir and passwordless sudo is unavailable.'
              echo 'Fix perms manually with a shared group, e.g.:'
              echo '  sudo chgrp -R <group> $VM_TARGET_DIR; sudo chmod -R g+rwX $VM_TARGET_DIR'
              exit 1
            fi
          "

      - name: Ensure rsync exists on runner
        run: |
          if ! command -v rsync >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y rsync
          fi

      - name: Ensure rsync exists on VM
        run: |
          ssh -p "$VM_PORT" "$VM_USER@$VM_HOST" '
            if command -v rsync >/dev/null 2>&1; then
              exit 0
            fi

            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update && sudo apt-get install -y rsync
            elif command -v dnf >/dev/null 2>&1; then
              sudo dnf install -y rsync
            elif command -v yum >/dev/null 2>&1; then
              sudo yum install -y rsync
            else
              echo "No supported package manager found to install rsync"
              exit 1
            fi
          '

      - name: Stop app with Docker Compose on VM (best effort)
        run: |
          ssh -p "$VM_PORT" "$VM_USER@$VM_HOST" '
            set +e
            cd "$VM_TARGET_DIR" 2>/dev/null || exit 0
            if [ -f docker-compose.yml ] || [ -f compose.yml ] || [ -f compose.yaml ]; then
              if docker compose version >/dev/null 2>&1; then
                docker compose down
              elif sudo -n true >/dev/null 2>&1; then
                sudo docker compose down
              fi
            fi
            exit 0
          '

      - name: Sync repository to VM
        run: |
          rsync -az --delete \
            --no-perms \
            --no-times \
            --omit-dir-times \
            --no-owner \
            --no-group \
            --exclude '.git/' \
            --exclude '.venv/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude '.chroma/' \
            --exclude 'data/' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            -e "ssh -p $VM_PORT" \
            ./ "$VM_USER@$VM_HOST:$VM_TARGET_DIR/"

      - name: Restart app with Docker Compose on VM
        run: |
          ssh -p "$VM_PORT" "$VM_USER@$VM_HOST" '
            set -e
            cd "$VM_TARGET_DIR"
            if docker compose version >/dev/null 2>&1; then
              docker compose up -d --build
            else
              sudo docker compose up -d --build
            fi
          '
